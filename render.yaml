services:
  - type: web
    name: sentimentlens
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn api.main:app --host 0.0.0.0 --port 8000
    envVars:
      - key: NEWSAPI_KEY
        sync: false

  - type: web
    name: sentimentlens-dashboard
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: python dashboard/app.py